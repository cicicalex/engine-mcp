name: ZPL Engine MCP
description: >-
  Mathematical stability engine. 67 tools (63 unique + 4 backwards-compat aliases) across
  11 categories — Finance, Gaming, AI/ML, Security, Crypto, Certification, Advanced,
  Universal, Meta, AI Eval, Core. Computes AIN (AI Neutrality Index) for bias detection
  and stability scoring. AIN is a STABILITY measurement only — never prediction or advice.
  Published on Zenodo (DOI available).
author: Ciciu Alexandru-Costinel (Zero Point Logic)
homepage: https://zeropointlogic.io
repository: https://github.com/cicicalex/engine-mcp
license: MIT
runtime: node
icon: https://zeropointlogic.io/icon-512.png
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      ZPL_API_KEY:
        type: string
        title: "API Key"
        description: "Your ZPL Engine API key (zpl_u_... or zpl_s_...). Free: 5,000 tokens/month, no credit card. Get one at https://zeropointlogic.io/auth/register"
      ZPL_MODE:
        type: string
        title: "Mode"
        description: "'pure' (default) hides AIN scores from the AI on text-eval tools to prevent observer-effect drift. 'coach' exposes scores so the AI can reason about them. See README for details."
        default: "pure"
        enum: ["pure", "coach"]
      ZPL_ENGINE_URL:
        type: string
        title: "Engine URL (self-hosted)"
        description: "Custom engine URL. Default: https://engine.zeropointlogic.io. Self-hosted users must also set ZPL_ENGINE_HOST_ALLOWLIST."
        default: "https://engine.zeropointlogic.io"
      ZPL_ENGINE_HOST_ALLOWLIST:
        type: string
        title: "Engine Host Allowlist (self-hosted)"
        description: "Comma-separated list of additional allowed hostnames when using a custom ZPL_ENGINE_URL. Prevents sending Bearer tokens to an unexpected host."
        default: ""
      ZPL_ENGINE_ALLOW_INSECURE_LOCAL:
        type: string
        title: "Allow Insecure Local (dev only)"
        description: "Set to '1' to allow http://localhost / 127.0.0.1 / ::1 as engine URL for local development. Never enable in production."
        default: "0"
        enum: ["0", "1"]
      ZPL_SKIP_UPDATE_CHECK:
        type: string
        title: "Skip Update Check (offline/CI)"
        description: "Set to '1' to skip the startup npm version check (useful for offline or air-gapped environments). MAJOR version-behind forced-upgrade is bypassed."
        default: "0"
        enum: ["0", "1"]
      ZPL_LANGUAGE:
        type: string
        title: "Language"
        description: "Response language. Supported: English, Romanian, German, French, Spanish, Italian."
        default: "en"
        enum: ["en", "ro", "de", "fr", "es", "it"]
      ZPL_OUTPUT:
        type: string
        title: "Output Style"
        description: "'detailed' for full reports, 'compact' for minimal JSON (CI/CD friendly)."
        default: "detailed"
        enum: ["detailed", "compact"]
      ZPL_DEFAULT_D:
        type: number
        title: "Default Dimension"
        description: "Default matrix dimension for computations (3-100). Higher = more precise, more tokens."
        default: 9
      ZPL_DEFAULT_SAMPLES:
        type: number
        title: "Default Samples"
        description: "Default sample count (100-50000). Higher = more precise."
        default: 1000
      ZPL_BUDGET_WARN:
        type: number
        title: "Budget Warning Threshold"
        description: "Warn when remaining tokens drop below this number."
        default: 500
      ZPL_RATE_LIMIT:
        type: number
        title: "Rate Limit (req/min)"
        description: "Client-side rate limit to prevent accidental token drain. Engine enforces its own limits too."
        default: 60
      ZPL_SAVE_HISTORY:
        type: string
        title: "Save History"
        description: "Save analysis results locally for review/export via zpl_history and zpl_export."
        default: "true"
        enum: ["true", "false"]
      ANTHROPIC_API_KEY:
        type: string
        title: "Anthropic API Key (optional)"
        description: "Required only for AI Eval tools (zpl_consistency_test, zpl_sycophancy_score, zpl_refusal_balance, zpl_language_equity, zpl_persona_drift, zpl_safety_boundary, zpl_hallucination_consistency, zpl_emotional_stability). Session-capped at 100 Claude calls."
    required:
      - ZPL_API_KEY
  commandFunction: |-
    (config) => ({
      command: "node",
      args: ["dist/index.js"],
      env: {
        ZPL_API_KEY: config.ZPL_API_KEY,
        ZPL_MODE: config.ZPL_MODE || "pure",
        ZPL_ENGINE_URL: config.ZPL_ENGINE_URL || "https://engine.zeropointlogic.io",
        ZPL_ENGINE_HOST_ALLOWLIST: config.ZPL_ENGINE_HOST_ALLOWLIST || "",
        ZPL_ENGINE_ALLOW_INSECURE_LOCAL: config.ZPL_ENGINE_ALLOW_INSECURE_LOCAL || "0",
        ZPL_SKIP_UPDATE_CHECK: config.ZPL_SKIP_UPDATE_CHECK || "0",
        ZPL_LANGUAGE: config.ZPL_LANGUAGE || "en",
        ZPL_OUTPUT: config.ZPL_OUTPUT || "detailed",
        ZPL_DEFAULT_D: String(config.ZPL_DEFAULT_D || 9),
        ZPL_DEFAULT_SAMPLES: String(config.ZPL_DEFAULT_SAMPLES || 1000),
        ZPL_BUDGET_WARN: String(config.ZPL_BUDGET_WARN || 500),
        ZPL_RATE_LIMIT: String(config.ZPL_RATE_LIMIT || 60),
        ZPL_SAVE_HISTORY: config.ZPL_SAVE_HISTORY || "true",
        ...(config.ANTHROPIC_API_KEY ? { ANTHROPIC_API_KEY: config.ANTHROPIC_API_KEY } : {})
      }
    })
# Tool inventory — kept short by category to avoid drift when new tools are added.
# See the full list at https://www.npmjs.com/package/zpl-engine-mcp or the README.
toolCategories:
  core: "zpl_compute, zpl_sweep, zpl_analyze, zpl_domains, zpl_health, zpl_plans, zpl_history, zpl_watchlist, zpl_report"
  finance: "zpl_market_scan, zpl_portfolio, zpl_fear_greed, zpl_forex_pair, zpl_sector_bias, zpl_macro, zpl_correlation"
  gaming: "zpl_loot_table, zpl_matchmaking, zpl_economy_check, zpl_pvp_balance, zpl_gacha_audit, zpl_rng_test"
  ai_ml: "zpl_model_bias, zpl_dataset_audit, zpl_prompt_test, zpl_benchmark"
  security: "zpl_vuln_map, zpl_risk_score, zpl_compliance"
  crypto: "zpl_whale_check, zpl_defi_risk, zpl_liquidity, zpl_tokenomics"
  certification: "zpl_debate, zpl_news_bias, zpl_review_bias"
  advanced: "zpl_simulate, zpl_leaderboard, zpl_chart, zpl_teach, zpl_alert, zpl_versus (+ alias zpl_balance_compare)"
  universal: "zpl_check_response, zpl_explain, zpl_decide (+ alias zpl_balance_check), zpl_compare (+ alias zpl_balance_pair), zpl_rank (+ alias zpl_balance_rank)"
  meta: "zpl_about, zpl_quota, zpl_score_only, zpl_validate_input, zpl_batch, zpl_export, zpl_usage, zpl_account, zpl_history"
  ai_eval: "zpl_consistency_test, zpl_sycophancy_score, zpl_refusal_balance, zpl_language_equity, zpl_persona_drift, zpl_safety_boundary, zpl_hallucination_consistency, zpl_emotional_stability"
